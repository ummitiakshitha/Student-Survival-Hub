<head>

  


    <title>Contact</title>

    <link rel="stylesheet"
          href="style.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>
<body class="contact-page">

<nav>

    <div class="logo">
        Student Survival Hub
    </div>

    <div class="nav-links">

        <a href="index.html">Home</a>

        <a href="resources.html">Resources</a>

        <a href="timetable.html">Timetable</a>

        <a href="placements.html">Placements</a>

        <a href="stress.html">Stress Relief</a>

        <a href="contact.html">Contact</a>

    </div>

</nav>



<section class="contact-section">

    <div class="contact-container">

        <div class="contact-text">

            <h2>📩 Contact Us</h2>

            <p>
                Have suggestions, feedback,
                or ideas to improve Student Survival Hub?
                Feel free to connect 💖
            </p>

            <img src="https://cdn-icons-png.flaticon.com/512/4233/4233830.png">

        </div>



        <div class="contact-form">

            <form>

                <input type="text"
                       placeholder="Enter your name">

                <input type="email"
                       placeholder="Enter your email">

                <input type="tel"
                       placeholder="Enter mobile number">

                <textarea rows="6"
                          placeholder="Your feedback"></textarea>

                <button type="submit">
                    Submit
                </button>

            </form>

        </div>

    </div>

</section>



<section class="quote-section">

    <h2>
        “Every great project starts with a small idea.” ✨
    </h2>

</section>
